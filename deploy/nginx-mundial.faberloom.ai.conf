# vhost para mundial.faberloom.ai → contenedor mundial-web (3300:3000)
# Colócalo en el nginx que ya escucha 80/443 (mwt-nginx) y recarga: nginx -s reload
# TLS lo da Cloudflare (Proxied, modo Full strict); aquí basta el puerto 80.

server {
    listen 80;
    listen [::]:80;
    server_name mundial.faberloom.ai;

    # tamaño de subida razonable
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
