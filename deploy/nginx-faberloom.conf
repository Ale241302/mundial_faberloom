# vhost FaberLoom → contenedor mundial-web (3300:3000)
# Sirve la MISMA app en todos los dominios; el front decide por hostname:
#   faberloom.ai / www.faberloom.ai     -> landing
#   wc.faberloom.ai (y mundial.* compat) -> simulador
# Colócalo en mwt-nginx (el que escucha 80/443) y recarga: nginx -s reload
# TLS lo da Cloudflare (Proxied). Aquí basta el puerto 80.

server {
    listen 80;
    listen [::]:80;
    server_name faberloom.ai www.faberloom.ai wc.faberloom.ai mundial.faberloom.ai;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
